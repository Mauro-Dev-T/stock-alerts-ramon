<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Alerts - Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: #080c10;
            color: #e2e8f0;
            font-family: 'Rajdhani', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .login-box {
            background: #0d1117;
            border: 1px solid #1a2332;
            padding: 48px 40px;
            width: 380px;
        }
        
        .logo {
            text-align: center;
            margin-bottom: 36px;
        }
        
        .logo h1 {
            font-size: 24px;
            color: #00d4aa;
            letter-spacing: 3px;
            margin-bottom: 8px;
        }
        
        .logo p {
            font-size: 12px;
            color: #4a5568;
            letter-spacing: 2px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            font-size: 11px;
            letter-spacing: 2px;
            color: #4a5568;
            margin-bottom: 8px;
            text-transform: uppercase;
        }
        
        input {
            width: 100%;
            background: #080c10;
            border: 1px solid #1a2332;
            color: #e2e8f0;
            padding: 12px 16px;
            font-size: 14px;
            outline: none;
        }
        
        input:focus {
            border-color: #00d4aa;
        }
        
        button {
            width: 100%;
            background: transparent;
            border: 1px solid #00d4aa;
            color: #00d4aa;
            padding: 14px;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            cursor: pointer;
            margin-top: 8px;
        }
        
        button:hover {
            background: #00d4aa;
            color: #080c10;
        }
        
        .error {
            background: rgba(255,71,87,0.1);
            border: 1px solid #ff4757;
            color: #ff4757;
            padding: 10px 14px;
            font-size: 13px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="logo">
            <h1>⚡ STOCK ALERTS</h1>
            <p>Trading System</p>
        </div>
        
        {% if error %}
        <div class="error">⚠ {{ error }}</div>
        {% endif %}
        
        <form method="POST">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required>
            </div>
            <button type="submit">Login →</button>
        </form>
    </div>
</body>
</html>
